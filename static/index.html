<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Questions</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>All Questions</h1>
  <ul id="questions-list"></ul>
  
  <div class="centered">
    <a href="/new-question.html" class="button" id="create-question-btn">Create New Question</a>
  </div>
  
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <p id="modal-message"></p>
      <div class="modal-buttons">
        <button id="modal-confirm" class="button">Confirm</button>
        <button id="modal-cancel" class="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="alert" class="modal hidden">
    <div class="modal-content">
      <p id="alert-message"></p>
      <button id="alert-ok" class="button">OK</button>
    </div>
  </div>

  <script src="/main.js"></script>
</body>
</html>
