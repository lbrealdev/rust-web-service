<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <title>create new question</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← back to questions</a>
    <h1>create new question</h1>

    <form id="new-question-form">
      <div class="form-section">
        <label for="title">title</label>
        <input type="text" id="title" name="title" placeholder="enter question title…" autocomplete="off" required />
      </div>

      <div class="form-section">
        <label for="content">content</label>
        <textarea id="content" name="content" rows="6" placeholder="describe your question…" autocomplete="off" required></textarea>
      </div>

      <div class="form-section">
        <label for="tags">tags (comma separated)</label>
        <input type="text" id="tags" name="tags" placeholder="tag1, tag2, tag3…" autocomplete="off" />
      </div>

      <p id="form-error" class="form-error hidden" aria-live="polite"></p>

      <div class="form-actions">
        <button type="submit" id="submit-btn" class="button">submit question</button>
        <a href="/" class="button">back to questions</a>
      </div>
    </form>
  </div>

  <button class="theme-toggle" id="theme-toggle" aria-label="toggle dark mode">toggle theme</button>

  <script src="/new-question.js"></script>
</body>
</html>
