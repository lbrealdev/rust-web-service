<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create New Question</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <h1>Create New Question</h1>

  <form id="new-question-form">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" placeholder="Enter question title" required />

    <label for="content">Content</label>
    <textarea id="content" name="content" rows="5" placeholder="Describe your question" required></textarea>

    <label for="tags">Tags (comma separated)</label>
    <input type="text" id="tags" name="tags" placeholder="tag1, tag2, tag3" />

    <button type="submit">Submit Question</button>
  </form>

  <div class="centered">
    <a href="/" class="button" id="back-question-btn">Back to Questions</a>
  </div>

  <script src="/new-question.js"></script>
</body>
</html>
